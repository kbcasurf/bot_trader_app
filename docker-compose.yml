version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - VITE_API_URL=http://backend:4000/api
      - VITE_PROFIT_THRESHOLD=${VITE_PROFIT_THRESHOLD}
      - VITE_LOSS_THRESHOLD=${VITE_LOSS_THRESHOLD}
    volumes:
      - ./.env:/app/.env

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env
    networks:
      - app-network
    restart: unless-stopped

  database:
    build: ./database
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${DB_NAME}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  db-data: